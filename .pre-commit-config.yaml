# Pre-commit hooks configuration
# Enforces code quality, formatting, and documentation standards
# Integrated with pyproject.toml configuration

repos:
  # Ruff - Modern Python linter and formatter (replaces black, isort, flake8)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      # Run the linter
      - id: ruff
        args: [--fix]
        types_or: [python, pyi]
      # Run the formatter
      - id: ruff-format
        types_or: [python, pyi]

  # Markdown formatting with MkDocs support
  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.19
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm>=0.3.5          # GitHub Flavored Markdown
          - mdformat-mkdocs>=2.0.0       # MkDocs-specific formatting
          - mdformat-frontmatter>=2.0.1  # YAML frontmatter support
        args: [--wrap, "no"]
        exclude: ^\.claude/  # Exclude Claude Code configuration files

  # Spell checking
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args:
          - --ignore-words-list=sur,nad,als,crate,unexpect,aks,gud,themeing,inforce
          - --skip=*.min.js,*.min.css,*.lock,venv/*,.git/*,site/*

  # YAML validation
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [--config-file, .yamllintrc]
        types: [yaml]

  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Prevent commits to protected branches
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]

      # File checks
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-symlinks
      - id: destroyed-symlinks

      # JSON/TOML/YAML syntax checks
      - id: check-json
      - id: check-toml
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^mkdocs\.yml$  # MkDocs uses Python-specific YAML tags

      # Python-specific
      - id: check-ast                    # Valid Python syntax
      - id: check-builtin-literals       # Use [] instead of list()
      - id: check-docstring-first        # Docstring before code
      - id: debug-statements             # No debugger statements
      - id: name-tests-test              # Test files named test_*.py
        args: [--pytest-test-first]

      # File hygiene
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]

      # Security
      - id: detect-private-key

  # Python security checks
  - repo: https://github.com/pycqa/bandit
    rev: 1.8.0
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]
        exclude: ^tests/

  # pyproject.toml validation
  - repo: https://github.com/python-jsonschema/check-jsonschema
    rev: 0.30.0
    hooks:
      - id: check-dependabot
      - id: check-github-workflows
      - id: check-readthedocs

# Configuration
ci:
  autofix_commit_msg: "style: auto-fix pre-commit hooks"
  autofix_prs: true
  autoupdate_commit_msg: "chore: update pre-commit hooks"
  autoupdate_schedule: monthly
  skip: []
  submodules: false
