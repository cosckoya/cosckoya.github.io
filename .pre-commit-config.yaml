---
repos:
  # Standard pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: detect-private-key
      - id: check-json
      - id: check-toml

  # Enhanced YAML validation
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1
    hooks:
      - id: yamllint

  # Spell checking for documentation
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell

  # Markdown formatting (MkDocs-aware)
  - repo: https://github.com/executablebooks/mdformat
    rev: 1.0.0
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-mkdocs>=2.0.0
          - mdformat-gfm>=0.3.5
          - mdformat-frontmatter>=2.0.1
        args: [--wrap, '120']
        exclude: '^(\.github/docs/architecture/|venv/|site/|test/)'

  # MkDocs build validation
  - repo: local
    hooks:
      - id: mkdocs-build
        name: mkdocs-build
        entry: bash
        args: [-c, 'rm -rf test && source venv/bin/activate && mkdocs build --strict --quiet --site-dir test']
        language: system
        pass_filenames: false
