site_name: It's dangerous to go alone!
site_url: https://cosckoya.github.io
site_description: Cosckoya's Tech Toolbox
site_author: 'cosckoya'
copyright: Copyright &copy; 2024 цосцкоыа

repo_url: https://github.com/cosckoya/cosckoya.github.io
edit_uri: ""

theme:
  name: material
  logo: resources/img/logo.png
  favicon: resources/img/favicon.png
  language: en
  #highlightjs: true
  #hljs_style: gml
  #hljs_languages:
  #  - bash,sh
  #  - yaml
  #  - python
  palette:
    # Light mode
    - scheme: default
      primary: deep purple
      accent: teal
      toggle:
        icon: material/lightbulb-outline
        name: Switch to dark mode

    # Dark mode (default)
    - scheme: slate
      primary: deep purple
      accent: teal
      toggle:
        icon: material/lightbulb
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
    admonition:
      note: octicons/info-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/light-bulb-16
      success: octicons/check-circle-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/stop-16
      bug: octicons/bug-16
      example: octicons/code-16
      quote: octicons/quote-16
    tag:
      default: octicons/tag-16
  features:
    # Navigation enhancements
    - navigation.indexes
    - navigation.breadcrumbs       # Breadcrumb trail
    - navigation.instant.loading   # SPA-like navigation
    - navigation.tracking          # URL updates on scroll
    - navigation.top               # Back to top button

    # Search improvements
    - search.suggest               # Search suggestions
    - search.highlight             # Highlight search matches
    - search.share                 # Share search results

    # Content features
    - content.tabs.link            # Persistent tab state
    - content.code.copy            # Copy code button
    - content.code.select          # Select code easily
    - content.code.annotate        # Inline code annotations
    - content.tooltips             # Abbreviation tooltips

    # Table of contents
    - toc.follow                   # Follow scroll position

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cosckoya
    - icon: fontawesome/brands/gitlab
      link: https://gitlab.com/cosckoya
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/cosckoya
    - icon: fontawesome/brands/dev
      link: https://dev.to/cosckoya
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/javier-coscolla-cabrera-95948224
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/u/cosckoya

markdown_extensions:
  - toc:
      permalink: True
# Admotions
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
# Annotations
  - attr_list
  - md_in_html
# TBR
  - def_list
  - pymdownx.magiclink
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
#      base_path: 'resources/code'
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang: en
      pipeline:
        - stemmer                  # Word stemming (running → run)
        - stopWordFilter           # Remove common words
        - trimmer                  # Whitespace cleanup
      separator: '[\s\-\.]'        # Search delimiters
  - same-dir
  - tags
  - literate-nav:
      nav_file: SUMMARY.md
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
      cache_safe: true

extra_css:
  - resources/stylesheets/images.css
  - stylesheets/snape.css
