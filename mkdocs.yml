site_name: It's dangerous to go alone!
site_url: https://cosckoya.github.io
site_description: Cosckoya's Tech Toolbox
site_author: 'cosckoya'
copyright: Copyright &copy; 2026 цосцкоыа

validation:
  invalid_links: true
  invalid_link_anchors: true

repo_url: https://github.com/cosckoya/cosckoya.github.io
edit_uri: ""

theme:
  variant: modern
  logo: resources/img/logo.png
  favicon: resources/img/favicon.png
  language: en
  palette:
    # Auto mode (follows system preference)
    - media: "(prefers-color-scheme)"
      toggle:
        icon: lucide/sun-moon
        name: Switch to system preference

    # MALEFICENT THEME - Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: teal
      toggle:
        icon: lucide/sun
        name: Switch to dark mode

    # MALEFICENT THEME - Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: purple
      accent: lime
      toggle:
        icon: lucide/moon
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
    admonition:
      note: fontawesome/solid/circle-info
      abstract: fontawesome/solid/list-check
      info: fontawesome/solid/circle-info
      tip: fontawesome/solid/lightbulb
      success: fontawesome/solid/circle-check
      question: fontawesome/solid/circle-question
      warning: fontawesome/solid/triangle-exclamation
      failure: fontawesome/solid/circle-xmark
      danger: fontawesome/solid/skull
      bug: fontawesome/solid/bug
      example: fontawesome/solid/flask
      quote: fontawesome/solid/quote-left
    tag:
      default: lucide/hash
      cloud: lucide/cloud
      security: lucide/shield
      ai: lucide/sparkles
      api: lucide/code
      database: lucide/database
      container: lucide/container
      os: lucide/monitor
      tool: lucide/wrench
      language: lucide/code-2
  features:
    - navigation.sections
    - navigation.expand
    - navigation.breadcrumbs
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - navigation.path
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.tooltips
    - navigation.prune
    - content.footnote.tooltips
    - content.action.edit
    - content.action.view
    - toc.follow
    - header.autohide
    - announce.dismiss

extra:
  tags:
    cloud: cloud
    security: security
    ai: ai
    api: api
    database: database
    container: container
    os: os
    tool: tool
    language: language
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cosckoya
    - icon: fontawesome/brands/gitlab
      link: https://gitlab.com/cosckoya
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/cosckoya
    - icon: fontawesome/brands/dev
      link: https://dev.to/cosckoya
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/javier-coscolla-cabrera-95948224
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/u/cosckoya

markdown_extensions:
  - toc:
      permalink: True
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      use_pygments: true
      anchor_linenums: true
      line_spans: __span
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.keys
  - pymdownx.tasklist:
      custom_checkbox: true
  - abbr
  - footnotes
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - zensical.extensions.glightbox
  - zensical.extensions.macros

extra_css:
  - resources/css/images.css
  - resources/css/snape.css

docs_dir: docs
site_dir: site
dev_addr: 127.0.0.1:8000
