site_name: It's dangerous to go alone!
site_url: https://cosckoya.github.io
site_description: Cosckoya's Tech Toolbox
site_author: 'cosckoya'
copyright: Copyright &copy; 2026 цосцкоыа

repo_url: https://github.com/cosckoya/cosckoya.github.io
edit_uri: ""

theme:
  name: material
  logo: resources/img/logo.png
  favicon: resources/img/favicon.png
  language: en
  #highlightjs: true
  #hljs_style: gml
  #hljs_languages:
  #  - bash,sh
  #  - yaml
  #  - python
  palette:
    # ORIGINAL THEME (Deep Purple + Teal) - Uncomment to restore
    # - scheme: slate
    #   primary: deep purple
    #   accent: teal
    # - scheme: default
    #   primary: deep purple
    #   accent: teal

    # MALEFICENT THEME (Purple + Acid Green)
    # Dark mode (default)
    - scheme: slate
      primary: purple
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

    # Light mode
    - scheme: default
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  icon:
    repo: fontawesome/brands/github
    admonition:
      note: fontawesome/solid/circle-info
      abstract: fontawesome/solid/list-check
      info: fontawesome/solid/circle-info
      tip: fontawesome/solid/lightbulb
      success: fontawesome/solid/circle-check
      question: fontawesome/solid/circle-question
      warning: fontawesome/solid/triangle-exclamation
      failure: fontawesome/solid/circle-xmark
      danger: fontawesome/solid/skull
      bug: fontawesome/solid/bug
      example: fontawesome/solid/flask
      quote: fontawesome/solid/quote-left
    tag:
      default: fontawesome/solid/tag
  features:
    # Navigation enhancements
    - navigation.sections          # Expandable/collapsible sections
    - navigation.expand            # Expand all sections by default
    - navigation.breadcrumbs       # Breadcrumb trail
    - navigation.instant.loading   # SPA-like navigation
    - navigation.instant.prefetch  # Prefetch pages on hover
    - navigation.instant.progress  # Show progress indicator
    - navigation.tracking          # URL updates on scroll
    - navigation.top               # Back to top button
    - navigation.indexes           # Section index pages (index.md per section)
    - navigation.footer            # Previous/next page navigation
    - navigation.path              # Show page path in navigation

    # Search improvements
    - search.suggest               # Search suggestions
    - search.highlight             # Highlight search matches
    - search.share                 # Share search results

    # Content features
    - content.tabs.link            # Persistent tab state
    - content.code.copy            # Copy code button
    - content.code.select          # Select code easily
    - content.code.annotate        # Inline code annotations
    - content.tooltips             # Abbreviation tooltips
    - content.footnote.tooltips    # Footnotes as inline tooltips (9.x+)
    - content.action.edit          # Edit page link
    - content.action.view          # View source link

    # Table of contents
    - toc.follow                   # Follow scroll position

    # Header improvements
    - header.autohide              # Auto-hide header on scroll
    - announce.dismiss             # Dismissible announcements

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/cosckoya
    - icon: fontawesome/brands/gitlab
      link: https://gitlab.com/cosckoya
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/cosckoya
    - icon: fontawesome/brands/dev
      link: https://dev.to/cosckoya
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/javier-coscolla-cabrera-95948224
    - icon: fontawesome/brands/docker
      link: https://hub.docker.com/u/cosckoya

markdown_extensions:
  - toc:
      permalink: True
# Admotions
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
# Annotations
  - attr_list
  - md_in_html
# TBR
  - def_list
  - pymdownx.magiclink
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
#      base_path: 'resources/code'
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang: en
      pipeline:
        - stemmer                  # Word stemming (running → run)
        - stopWordFilter           # Remove common words
        - trimmer                  # Whitespace cleanup
      separator: '[\s\-\.]'        # Search delimiters
  - same-dir
  - section-index
  - tags
  - literate-nav:
      nav_file: SUMMARY.md
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
      cache_safe: true

extra_css:
  - resources/css/images.css
  - resources/css/snape.css
