extra_css = [
  "resources/css/images.css",
  "resources/css/snape.css",
]

[validation]
invalid_links = true
invalid_link_anchors = true

[theme]
variant = "modern"
custom_dir = "overrides"
logo = "resources/img/logo.png"
favicon = "resources/img/favicon.png"
language = "en"
features = [
  "navigation.sections",
  "navigation.expand",
  "navigation.breadcrumbs",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.tracking",
  "navigation.top",
  "navigation.indexes",
  "navigation.footer",
  "navigation.path",
  "search.suggest",
  "search.highlight",
  "content.tabs.link",
  "content.code.copy",
  "content.code.select",
  "content.code.annotate",
  "content.tooltips",
  "navigation.prune",
  "content.footnote.tooltips",
  "toc.follow",
  "header.autohide",
  "announce.dismiss",
]

[[theme.palette]]
media = "(prefers-color-scheme)"
[theme.palette.toggle]
icon = "lucide/sun-moon"
name = "Switch to system preference"

[[theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "deep purple"
accent = "teal"
[theme.palette.toggle]
icon = "lucide/sun"
name = "Switch to dark mode"

[[theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "purple"
accent = "lime"
[theme.palette.toggle]
icon = "lucide/moon"
name = "Switch to light mode"

[theme.icon]
repo = "simple/github"

[theme.icon.admonition]
note = "lucide/info"
abstract = "lucide/list-check"
info = "lucide/info"
tip = "lucide/lightbulb"
success = "lucide/circle-check"
question = "lucide/circle-help"
warning = "lucide/alert-triangle"
failure = "lucide/x-circle"
danger = "lucide/skull"
bug = "lucide/bug"
example = "lucide/flask-conical"
quote = "lucide/text-quote"

[theme.icon.tag]
default = "lucide/hash"
cloud = "lucide/cloud"
security = "lucide/shield"
ai = "lucide/sparkles"
api = "lucide/code"
database = "lucide/database"
container = "lucide/container"
os = "lucide/monitor"
tool = "lucide/wrench"
language = "lucide/code-2"

[extra.tags]
cloud = "cloud"
security = "security"
ai = "ai"
api = "api"
database = "database"
container = "container"
os = "os"
tool = "tool"
language = "language"

[[extra.social]]
icon = "simple/github"
link = "https://github.com/cosckoya"

[[extra.social]]
icon = "simple/gitlab"
link = "https://gitlab.com/cosckoya"

[[extra.social]]
icon = "simple/x"
link = "https://twitter.com/cosckoya"

[[extra.social]]
icon = "simple/devdotto"
link = "https://dev.to/cosckoya"

[[extra.social]]
icon = "material/linkedin"
