[[extra.social]]
icon = "simple/docker"
link = "https://hub.docker.com/u/cosckoya"

# --- Markdown Extensions ---

[markdown_extensions]
toc = { permalink = true }
admonition = {}
"attr_list" = {}
"md_in_html" = {}
"def_list" = {}
"abbr" = {}
"footnotes" = {}

[markdown_extensions.pymdownx]
details = {}
superfences = { custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]}
tabbed = { alternate_style = true }
highlight = { use_pygments = true, anchor_linenums = true, line_spans = "__span" }
inlinehilite = {}
snippets = {}
magiclink = {}
mark = {}
caret = {}
tilde = {}
keys = {}
tasklist = { custom_checkbox = true }

[markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[plugins]
glightbox = {}
macros = {}
