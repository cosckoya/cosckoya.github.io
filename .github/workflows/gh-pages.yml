name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install yamllint codespell

      - name: Lint YAML
        run: yamllint -c .yamllint.yml mkdocs.yml

      - name: Spell check
        run: codespell docs/ --skip="*.png,*.jpg,*.svg,*.ico"

  build:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements-lock.txt

      - run: mkdocs build --strict

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required: mkdocs gh-deploy pushes to gh-pages branch
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"
          cache: "pip"

      - run: pip install -r requirements-lock.txt

      - run: mkdocs gh-deploy --force
        env:
          DISABLE_MKDOCS_2_WARNING: "true"
